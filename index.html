<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description" content="Daily Reset — personal habit and beginner fitness tracker" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily Reset" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="app.css" />

  <title>Daily Reset</title>

  <!-- Inline SVG defs for the progress ring gradient -->
  <svg class="defs-only" aria-hidden="true">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#a78bfa" />
        <stop offset="100%" stop-color="#06b6d4" />
      </linearGradient>
    </defs>
  </svg>
</head>
<body>

<div id="app">

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="header-left">
      <h1>Daily Reset</h1>
      <div class="date-label" id="header-date">Loading…</div>
    </div>
    <div class="streak-badge">
      <span class="streak-flame">🔥</span>
      <span id="header-streak">0</span>
    </div>
  </header>

  <!-- ── Main scrollable content ── -->
  <main class="app-main">

    <!-- ══════════════════════════════════════════
         TODAY TAB
    ══════════════════════════════════════════ -->
    <section class="tab-content" data-tab="today">

      <!-- Overview ring -->
      <div class="overview-card">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 80 80">
            <circle class="ring-bg" cx="40" cy="40" r="34" />
            <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="34"
              stroke-dasharray="213.6" stroke-dashoffset="213.6" />
          </svg>
          <div class="ring-pct" id="ring-pct">0%</div>
        </div>
        <div class="overview-text">
          <div class="greeting" id="overview-greeting">Good morning.</div>
          <div class="encouragement" id="overview-enc">A fresh start. Every day is a new chance.</div>
        </div>
      </div>

      <!-- Morning checklist -->
      <div class="card">
        <div class="card-header">
          <h2><span class="section-icon">🌅</span> Morning</h2>
          <span class="completion-mini" id="morning-mini">0/4</span>
        </div>
        <div id="morning-list"></div>
      </div>

      <!-- Food & Water -->
      <div class="card">
        <div class="card-header">
          <h2><span class="section-icon">🥗</span> Food &amp; Water</h2>
          <span class="completion-mini" id="food-mini">0/3</span>
        </div>
        <div id="food-list"></div>

        <!-- Water counter -->
        <div class="water-row">
          <div class="water-label-wrap">
            <span class="water-label">💧 Water glasses</span>
            <div class="water-dots" id="water-dots"></div>
          </div>
          <div class="water-counter">
            <button class="water-btn" id="water-minus" aria-label="Remove glass">−</button>
            <span class="water-count" id="water-count">0</span>
            <button class="water-btn" id="water-plus" aria-label="Add glass">+</button>
          </div>
        </div>
      </div>

      <!-- Evening -->
      <div class="card">
        <div class="card-header">
          <h2><span class="section-icon">🌙</span> Evening</h2>
          <span class="completion-mini" id="evening-mini">0/1</span>
        </div>
        <div id="evening-list"></div>
      </div>

      <!-- 7-day dots -->
      <div class="card">
        <div class="seven-day-section">
          <div class="seven-day-label">Last 7 Days</div>
          <div class="seven-day-dots" id="seven-day-dots"></div>
        </div>
      </div>

    </section>

    <!-- ══════════════════════════════════════════
         WORKOUT TAB
    ══════════════════════════════════════════ -->
    <section class="tab-content" data-tab="workout">

      <!-- Workout preview (rest day / upcoming / start) -->
      <div id="workout-preview"></div>

      <!-- Active workout session (shown during a workout) -->
      <div id="workout-session" class="workout-session"></div>

    </section>

    <!-- ══════════════════════════════════════════
         PROGRESS TAB
    ══════════════════════════════════════════ -->
    <section class="tab-content" data-tab="progress">
      <!-- Populated by renderProgressTab() -->
    </section>

    <!-- ══════════════════════════════════════════
         SETTINGS TAB
    ══════════════════════════════════════════ -->
    <section class="tab-content" data-tab="settings">
      <!-- Populated by renderSettingsTab() -->
    </section>

  </main><!-- /.app-main -->

  <!-- ── Bottom navigation ── -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">

    <button class="nav-btn active" data-tab="today" aria-label="Today">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Today
    </button>

    <button class="nav-btn" data-tab="workout" aria-label="Workout">
      <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11M6.5 17.5h11"/><circle cx="4" cy="12" r="2"/><circle cx="20" cy="12" r="2"/><path d="M6 12h12"/></svg>
      Workout
    </button>

    <button class="nav-btn" data-tab="progress" aria-label="Progress">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress
    </button>

    <button class="nav-btn" data-tab="settings" aria-label="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>

  </nav>

</div><!-- /#app -->

<script src="app.js"></script>
</body>
</html>
