<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description" content="Daily Reset — daily schedule, nutrition, and beginner calisthenics" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily Reset" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="app.css" />

  <title>Daily Reset</title>

  <svg class="defs-only" aria-hidden="true">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#a78bfa" />
        <stop offset="100%" stop-color="#06b6d4" />
      </linearGradient>
    </defs>
  </svg>
</head>
<body>

<div id="app">

  <header class="app-header">
    <div class="header-left">
      <h1>Daily Reset</h1>
      <div class="date-label" id="header-date">Loading…</div>
    </div>
    <div class="streak-badge">
      <span class="streak-flame">🔥</span>
      <span id="header-streak">0</span>
    </div>
  </header>

  <main class="app-main">

    <!-- SCHEDULE TAB -->
    <section class="tab-content" data-tab="today">

      <div class="overview-card">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 80 80">
            <circle class="ring-bg" cx="40" cy="40" r="34" />
            <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="34"
              stroke-dasharray="213.6" stroke-dashoffset="213.6" />
          </svg>
          <div class="ring-pct" id="ring-pct">0%</div>
        </div>
        <div class="overview-text">
          <div class="greeting" id="overview-greeting">Good morning.</div>
          <div class="encouragement" id="overview-enc">One block at a time.</div>
        </div>
      </div>

      <div class="card nutrition-card">
        <div class="card-header">
          <h2><span class="section-icon">🎯</span> Today's targets</h2>
        </div>
        <div class="nutrition-targets" id="nutrition-targets"></div>
      </div>

      <div class="section-title">Your schedule</div>
      <div class="card schedule-card">
        <div id="schedule-timeline" class="schedule-timeline"></div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><span class="section-icon">💧</span> Water</h2>
        </div>
        <div class="water-row">
          <div class="water-label-wrap">
            <span class="water-label">Glasses today (goal: 6+)</span>
            <div class="water-dots" id="water-dots"></div>
          </div>
          <div class="water-counter">
            <button class="water-btn" id="water-minus" aria-label="Remove glass">−</button>
            <span class="water-count" id="water-count">0</span>
            <button class="water-btn" id="water-plus" aria-label="Add glass">+</button>
          </div>
        </div>
      </div>

      <div class="section-title">Supplements</div>
      <div class="card" id="supplements-card"></div>

      <details class="card recomp-details">
        <summary class="card-header recomp-summary">
          <h2><span class="section-icon">💡</span> Why this works for skinny-fat</h2>
        </summary>
        <div class="recomp-body" id="recomp-tips"></div>
      </details>

      <div class="card">
        <div class="seven-day-section">
          <div class="seven-day-label">Last 7 Days</div>
          <div class="seven-day-dots" id="seven-day-dots"></div>
        </div>
      </div>

    </section>

    <!-- WORKOUT TAB -->
    <section class="tab-content" data-tab="workout">
      <div id="workout-preview"></div>
      <div id="workout-session" class="workout-session"></div>
    </section>

    <!-- PROGRESS TAB -->
    <section class="tab-content" data-tab="progress"></section>

    <!-- SETTINGS TAB -->
    <section class="tab-content" data-tab="settings"></section>

  </main>

  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-btn active" data-tab="today" aria-label="Schedule">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Schedule
    </button>
    <button class="nav-btn" data-tab="workout" aria-label="Workout">
      <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11M6.5 17.5h11"/><circle cx="4" cy="12" r="2"/><circle cx="20" cy="12" r="2"/><path d="M6 12h12"/></svg>
      Workout
    </button>
    <button class="nav-btn" data-tab="progress" aria-label="Progress">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress
    </button>
    <button class="nav-btn" data-tab="settings" aria-label="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
